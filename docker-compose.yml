name: ad-budget-guard

services:
  adbudget-db:
    image: postgres:16-alpine
    container_name: adbudget-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-adbudget}
    volumes:
      - adbudget-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-adbudget}", "-d", "${POSTGRES_DB:-adbudget}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5490:5432"

  adbudget-redis:
    image: redis:7-alpine
    container_name: adbudget-redis
    command: redis-server --appendonly yes
    volumes:
      - adbudget-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "6390:6379"

  adbudget-api:
    build:
      context: ./backend
    container_name: adbudget-api
    entrypoint: ./entrypoint.sh
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8020:8000"
    env_file: .env
    depends_on:
      adbudget-db:
        condition: service_healthy
      adbudget-redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adbudget-worker:
    build:
      context: ./backend
    container_name: adbudget-worker
    entrypoint: ./entrypoint-worker.sh
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      adbudget-api:
        condition: service_healthy

  adbudget-beat:
    build:
      context: ./backend
    container_name: adbudget-beat
    entrypoint: ./entrypoint-worker.sh
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      adbudget-redis:
        condition: service_healthy
      adbudget-api:
        condition: service_healthy

volumes:
  adbudget-pgdata:
  adbudget-redisdata:
